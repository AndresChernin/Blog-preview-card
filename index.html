<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="styles.css"> 
  <title>Frontend Mentor | Blog preview card</title>

  
</head>
<body>

  <main class="card-container">
    <div class="foto-container">
     <img src="./assets/images/illustration-article.svg" class="image-settings" 
           alt="QR code for Frontend Mentor scan with phone">
    </div>
    <div class="learning-part">
     <p>Learning</p>
    </div>
    <div class="datum-part">
     <p>Published 21 Dec 2023</p>
    </div>
    <div class="foundations-part">
     <p>HTML & CSS foundations</p>
    </div>
    <div class="discription-part">
      <p>These languages are the backbone of every website, defining structure, content, and presentation.
     </p>     
    </div>
    <div class="autor-part">
      <img src="./assets/images/image-avatar.webp" class="image-of-autor" alt="Image of autor">
      <p>Greg Hooper</p>

    </div>


  </main>


</body>
</html>
